  <section class="section-blacknumber">
    <div class="bg-decoration"><img src="./images/blacknumber/background-birdpng.png" alt=""></div>

    <div class="container">
      <header class="main-header">
        <div class="title-wrapper">
          <div class="title-icon"><img src="./images/blacknumber/deco-black-number.png" alt=""></div>
          <h1 >窗殺的數據偏差：黑數問題</h1>
        </div>
        <p class="header-desc">
          黑數造成的數據偏差，低估了窗殺對鳥類族群與生態系統的衝擊，也使防治政策與資源配置面臨挑戰。
        </p>
      </header>

      <div class="card-grid">
        <article class="card-item">
          <div class="card-img-box">
            <img src="./images/blacknumber/bird onepng.png" alt="無法辨識死因">
          </div>
          <div class="card-content">
            <div class="card-header">
              <span class="card-num">01</span>
              <span class="card-pill">無法辨識死因</span>
            </div>
            <p class="card-text">
              窗殺並不一定會導致外傷或出血。許多鳥類在高速撞擊後，外觀看似完好，實則內部顱內出血或頸椎骨折。
            </p>
          </div>
        </article>

        <article class="card-item">
          <div class="card-img-box">
            <img src="./images/blacknumber/bird two.png" alt="延遲性死亡">
          </div>
          <div class="card-content">
            <div class="card-header">
              <span class="card-num">02</span>
              <span class="card-pill">延遲性死亡</span>
            </div>
            <p class="card-text">
              撞擊後的鳥類常因腎上腺素激增而短暫恢復行動力，強撐著飛離現場。隱藏的內出血、腦震盪仍會奪走生命。
            </p>
          </div>
        </article>

        <article class="card-item">
          <div class="card-img-box">
            <img src="./images/blacknumber/bird three.png" alt="消失的證據">
          </div>
          <div class="card-content">
            <div class="card-header">
              <span class="card-num">03</span>
              <span class="card-pill">消失的證據</span>
            </div>
            <p class="card-text">
              鳥屍在都市中消失的速度極快。流浪貓狗、烏鴉或清潔人員常在一般人上班前就將鳥屍清掃乾淨。
            </p>
          </div>
        </article>
      </div>
    </div>
  </section>
